<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@500,700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#08080a; --on:#F0EDE7; --on-2:#b4afa6; --on-3:#6c675f;
    --red:#E23B26; --red-2:#FF5A43; --line:#ffffff14;
    --disp:'Clash Display',system-ui,sans-serif; --body:'Satoshi',system-ui,sans-serif; --mono:ui-monospace,Menlo,monospace;
    --ease:cubic-bezier(.16,1,.3,1); --gutter:clamp(20px,4vw,52px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow-x:hidden}
  body{min-height:100%}
  body{background:var(--bg);color:var(--on);font-family:var(--body);-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--red);color:#fff}
  #flow,#logo{position:fixed;inset:0}
  #flow{z-index:0} #logo{z-index:2}
  .vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(115% 95% at 50% 44%,transparent 38%,rgba(8,8,10,.5) 76%,rgba(8,8,10,.92) 100%)}

  header{position:fixed;top:0;left:0;right:0;z-index:6;display:flex;justify-content:space-between;align-items:center;
    padding:clamp(18px,2.6vw,28px) var(--gutter)}
  .navlogo{height:clamp(34px,4vw,46px);width:auto;display:block;filter:drop-shadow(0 4px 14px rgba(0,0,0,.55));transition:transform .2s var(--ease)}
  header .brand:hover .navlogo{transform:translateY(-1px)}
  nav{display:flex;gap:clamp(16px,2vw,30px);font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase}
  nav a{color:var(--on-2);position:relative}
  nav a::after{content:"";position:absolute;left:0;right:100%;bottom:-6px;height:1px;background:var(--red);transition:right .35s var(--ease)}
  nav a:hover{color:var(--on)} nav a:hover::after{right:0}

  .kick{position:fixed;top:clamp(86px,14vh,140px);left:0;right:0;z-index:4;text-align:center;
    font-family:var(--mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--red);opacity:1;will-change:opacity}
  .hl{position:fixed;inset:0;z-index:4;display:flex;align-items:center;justify-content:center;padding:0 var(--gutter);pointer-events:none;opacity:0;will-change:opacity}
  .hl h1{font-family:var(--disp);font-weight:600;font-size:clamp(54px,11.6vw,178px);line-height:.85;letter-spacing:-.035em;text-align:center;
    background:linear-gradient(180deg,#fff 0%,#d4cfc4 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .below{position:fixed;left:0;right:0;bottom:clamp(60px,11vh,118px);z-index:4;text-align:center;padding:0 var(--gutter);pointer-events:none;opacity:0;will-change:opacity}
  .below .line{font-family:var(--disp);font-weight:500;font-size:clamp(16px,2.1vw,24px);color:var(--on-2);letter-spacing:-.01em}
  .below .cta{pointer-events:auto;margin-top:24px;display:inline-flex;align-items:center;gap:11px;font-family:var(--mono);font-size:12px;
    letter-spacing:.16em;text-transform:uppercase;background:var(--red);color:#fff;padding:16px 30px;border-radius:100px;
    transition:transform .15s,background .25s,box-shadow .3s}
  .below .cta:hover{background:var(--red-2);transform:translateY(-1px);box-shadow:0 10px 32px -8px rgba(226,59,38,.6)}
  .cue{position:fixed;left:0;right:0;bottom:clamp(30px,6vh,54px);z-index:4;text-align:center;font-family:var(--mono);font-size:10px;
    letter-spacing:.26em;text-transform:uppercase;color:var(--on-3);animation:bob 2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}

  footer{position:fixed;left:0;right:0;bottom:0;z-index:6;display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap;
    padding:0 var(--gutter) clamp(16px,2.6vw,26px);font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--on-3)}
  footer .cities span{color:var(--on-2)} footer .cities b{color:var(--red);margin:0 4px}
  footer a{color:var(--on-2)} footer a:hover{color:var(--red)}
  @media(max-width:640px){nav{display:none} footer{justify-content:center;text-align:center} .below{bottom:96px}}
  @media (prefers-reduced-motion:reduce){.kick,.hl h1,.below .line,.below .cta{animation:none;opacity:1;transform:none}}
</style>
</head>

    tt+=0.02;var p=scrollP();
    var big=Math.min(560*DPR,LW*0.72),small=Math.min(170*DPR,LW*0.22),sc=(big+(small-big)*p)/iw;
    var oyf=0.47+(0.30-0.47)*p,ox=(LW-iw*sc)/2,oy=LH*oyf-(ih*sc)/2,sz=Math.max(1,STEP*sc*0.62),R=120*DPR,shim=reduce?0:1.7*DPR;
    lx.clearRect(0,0,LW,LH);
    for(var i=0;i<P.length;i++){var q=P[i];
      var tx=ox+q.sx*sc+Math.sin(tt+q.ph)*shim, ty=oy+q.sy*sc+Math.cos(tt*0.9+q.ph)*shim;
      if(reduce){q.x=tx;q.y=ty;}
      else{q.vx+=(tx-q.x)*q.e;q.vy+=(ty-q.y)*q.e;
        var dx=q.x-mx,dy=q.y-my,d2=dx*dx+dy*dy;if(d2<R*R){var f=(R*R-d2)/(R*R)*0.9,d=Math.sqrt(d2)||1;q.vx+=dx/d*f*15;q.vy+=dy/d*f*15;}
        q.vx*=0.82;q.vy*=0.82;q.x+=q.vx;q.y+=q.vy;}
      lx.fillStyle='rgb('+q.r+','+q.g+','+q.b+')';lx.fillRect(q.x,q.y,sz,sz);}
    var s1=1-smooth(0.05,0.36,p),s2=smooth(0.46,0.82,p);
    if(kickEl)kickEl.style.opacity=s1;if(cueEl)cueEl.style.opacity=s1;
    if(hlEl)hlEl.style.opacity=s2;if(belowEl)belowEl.style.opacity=s2;
    requestAnimationFrame(ldraw);
  }
  img.onload=function(){ready=true;sampleLogo();buildParticles();requestAnimationFrame(ldraw);};
  img.src=LOGO_SRC;

  var rt;addEventListener('resize',function(){clearTimeout(rt);rt=setTimeout(function(){fsize();lsize();},180);});
  fsize();lsize();if(!reduce)requestAnimationFrame(fframe);
})();
</script>
