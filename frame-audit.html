<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex">
<title>frame audit</title>
<style>
body{background:#141210;color:#eee;font-family:monospace;margin:0;padding:20px}
.row{display:grid;grid-template-columns:150px repeat(4,1fr);gap:8px;align-items:center;margin-bottom:8px;border-bottom:1px solid #333;padding-bottom:8px}
.row .name{font-size:12px;line-height:1.4}
.cell{position:relative;aspect-ratio:16/9;background:#222;overflow:hidden}
.cell img{width:100%;height:100%;object-fit:cover}
.cell .lb{position:absolute;top:2px;left:2px;font-size:9px;background:#000a;padding:1px 4px}
h1{font-size:14px;font-weight:normal;color:#aaa}
</style></head><body>
<h1>Frame audit — pick clean cinematic frames · columns: maxres / hq1 / hq2 / hq3</h1>
<div id="grid"></div>
<script>
var F=[
['01 In Fashion · Fashion','6f0QkNxO8mU'],
['02 Studio in Motion · Dance','7tSerANfgpk'],
['03 One Song One Stage · Perf','JwshyRJQcyg'],
['03b One Song 4K Demo','mFhLVTMePjQ'],
['04 The Clinic · Medical','WAu69V64gxA'],
['05 Open House · Real Estate','T9bhf0b1gjM'],
['06 Cozy Lab · Retail','heEe8QrI6hA'],
['07 On the Record · Interview','PeK0UpdBzuA'],
['08 Portrait · Ashleigh','_iP_Hybtny4'],
['09 Back to School · Lifestyle','K8UAlFxa8sM'],
['10 Talent Demo · Zhao Li','RV5i9Nu0J2Q']
];
document.getElementById('grid').innerHTML=F.map(function(f){
  var frames=['maxresdefault','hq1','hq2','hq3'];
  return '<div class="row"><div class="name">'+f[0]+'<br><span style="color:#777">'+f[1]+'</span></div>'+
    frames.map(function(fr){return '<div class="cell"><img loading="eager" src="https://i.ytimg.com/vi/'+f[1]+'/'+fr+'.jpg"><span class="lb">'+fr.replace('default','')+'</span></div>';}).join('')+
    '</div>';
}).join('');
</script></body></html>
