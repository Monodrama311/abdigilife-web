<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Work — AB Digilife</title>
<meta name="description" content="Selected films by AB Digilife — brand image on camera, across fashion, dance, medical aesthetics, real estate, retail and story. Vancouver.">
<link rel="canonical" href="https://abdigilife.com/work">
<meta name="theme-color" content="#f4f1ea">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta property="og:site_name" content="AB Digilife"><meta property="og:type" content="website">
<meta property="og:title" content="Work — AB Digilife"><meta property="og:url" content="https://abdigilife.com/work">
<meta property="og:image" content="https://abdigilife.com/og.jpg">
<meta name="twitter:card" content="summary_large_image"><meta name="twitter:image" content="https://abdigilife.com/og.jpg">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f1ea;--ink:#1c1a17;--dim:#6f6a61;--faint:#a49d92;--line:#1c1a1714;--accent:#c8442e;
  --serif:'Fraunces',Georgia,serif;--sans:'General Sans',system-ui,sans-serif;--mono:ui-monospace,Menlo,monospace;--e:cubic-bezier(.19,1,.22,1)}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
.wrap{max-width:1320px;margin:0 auto;padding:0 clamp(22px,4vw,60px)}
#flow{position:fixed;inset:0;z-index:0;opacity:.4;pointer-events:none}
.top{position:relative;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:26px 0}
.top .mk{font-family:var(--serif);font-weight:500;font-size:20px;text-decoration:none;color:inherit}.top .mk b{color:var(--accent)}
.top nav{display:flex;gap:26px}.top nav a{font-size:13px;text-decoration:none;color:var(--dim)}.top nav a:hover,.top nav a.on{color:var(--ink)}
/* index line — an index, not a section title */
.idx{position:relative;z-index:3;display:flex;justify-content:space-between;align-items:baseline;font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);border-bottom:1px solid var(--line);padding:clamp(30px,5vw,60px) 0 18px}
.idx b{color:var(--dim);font-weight:400}
/* cases — the image is the argument */
.cases{position:relative;z-index:3;padding:clamp(40px,6vw,80px) 0 clamp(20px,4vw,50px)}
.case{display:block;text-decoration:none;color:inherit;cursor:pointer;margin-bottom:clamp(70px,12vh,170px)}
.case:last-child{margin-bottom:clamp(30px,5vw,60px)}
.cmeta{display:flex;align-items:baseline;gap:clamp(12px,2vw,28px);flex-wrap:wrap;margin-bottom:clamp(16px,1.8vw,26px)}
.cmeta .cn{font-family:var(--mono);font-size:12px;letter-spacing:.14em;color:var(--faint)}
.cmeta .ct{font-family:var(--serif);font-weight:400;font-size:clamp(30px,5vw,72px);line-height:.94;letter-spacing:-.02em;transition:opacity .4s var(--e)}
.cmeta .cc{margin-left:auto;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
.cmeta .cw{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);opacity:0;transform:translateY(4px);transition:opacity .45s var(--e),transform .45s var(--e)}
.case:hover .cmeta .cw{opacity:1;transform:none}
.cframe{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#e7e2d8}
.cframe img{width:100%;height:100%;object-fit:cover;filter:saturate(.99);transform:scale(1.02);transition:transform 1s var(--e),filter .6s var(--e)}
.case:hover .cframe img{transform:scale(1.05);filter:saturate(1.03)}
.cframe .cplay{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.9);width:clamp(64px,7vw,92px);height:clamp(64px,7vw,92px);border-radius:50%;background:#f4f1eae6;display:grid;place-items:center;opacity:0;transition:opacity .5s var(--e),transform .5s var(--e)}
.case:hover .cframe .cplay{opacity:1;transform:translate(-50%,-50%) scale(1)}
.cframe .cplay::before{content:"";border-left:16px solid var(--ink);border-top:11px solid transparent;border-bottom:11px solid transparent;margin-left:5px}
.rev{opacity:0;transform:translateY(30px);transition:opacity 1.1s var(--e),transform 1.1s var(--e)}.rev.seen{opacity:1;transform:none}
.foot{position:relative;z-index:3;border-top:1px solid var(--line);padding:34px 0 56px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:18px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.foot a{text-decoration:none;color:var(--dim)}.foot a:hover{color:var(--accent)}
/* ceremonial lightbox — time for the eyes */
.lb{position:fixed;inset:0;z-index:200;background:#1c1a17;opacity:0;visibility:hidden;display:flex;align-items:center;justify-content:center;padding:clamp(14px,3vw,48px);transition:opacity .5s var(--e),visibility .5s}
.lb.on{opacity:1;visibility:visible}
.lb-inner{width:min(1280px,94vw,calc(82vh * 16 / 9));aspect-ratio:16/9;position:relative;overflow:hidden;transform:scale(.965);transition:transform .6s var(--e)}
.lb.on .lb-inner{transform:scale(1)}
.lb-inner iframe{width:100%;height:100%;border:0}
.lb-x{position:absolute;top:14px;right:16px;z-index:3;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:transparent;border:1px solid #ffffff40;padding:8px 14px;cursor:pointer;transition:background .3s,border-color .3s}
.lb-x:hover{background:#ffffff14;border-color:#ffffff80}
@media(max-width:640px){.top{flex-wrap:wrap;gap:10px 18px}.top nav{gap:15px;font-size:12px;flex-wrap:wrap}.cmeta .cc{margin-left:0}.foot{gap:12px}}
</style>
</head>
<body>
<canvas id="flow"></canvas>
<div class="wrap">
  <header class="top">
    <a class="mk" href="/">AB<b>·</b>Digilife</a>
    <nav><a class="on" href="/work.html">Work</a><a href="/services.html">Services</a><a href="/process.html">Process</a><a href="/studio.html">Studio</a><a href="/contact.html">Contact</a></nav>
  </header>

  <h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap">AB Digilife — selected films</h1>
  <div class="idx"><span>Selected films</span><span><b>Vancouver</b> — 2026 / 08</span></div>

  <section class="cases" id="cases"></section>

  <footer class="foot">
    <span>© 2026 AB Digilife</span>
    <a href="https://www.instagram.com/ab.digilife/">Instagram ↗</a>
    <a href="https://www.youtube.com/@MrGlvte">YouTube ↗</a>
    <span>Vancouver · Calgary · Edmonton · Toronto · <a href="https://dmlogic.ca" target="_blank" rel="noopener">DMLogic ↗</a></span>
  </footer>
</div>

<div class="lb" id="lb"><div class="lb-inner"><button class="lb-x" id="lbx">✕ Close</button><div id="lbf"></div></div></div>

<script>
var FILMS=[
 {no:'01',t:'In Fashion',cat:'Fashion · Brand Film',yt:'6f0QkNxO8mU'},
 {no:'02',t:'Studio in Motion',cat:'Dance · Event Film',yt:'7tSerANfgpk'},
 {no:'03',t:'One Song, One Stage',cat:'Performance Film',yt:'JwshyRJQcyg'},
 {no:'04',t:'The Clinic',cat:'Medical Aesthetics',yt:'WAu69V64gxA'},
 {no:'05',t:'Open House',cat:'Real Estate · Property',yt:'T9bhf0b1gjM'},
 {no:'06',t:'Cozy Lab',cat:'Retail · Space',yt:'heEe8QrI6hA'},
 {no:'07',t:'On the Record',cat:'Interview · Story',yt:'PeK0UpdBzuA'},
 {no:'08',t:'Back to School',cat:'Lifestyle · Talk',yt:'K8UAlFxa8sM'}
];
var cases=document.getElementById('cases');
cases.innerHTML=FILMS.map(function(f){
 return '<article class="case rev" data-yt="'+f.yt+'">'+
  '<div class="cmeta"><span class="cn">'+f.no+'</span><span class="ct">'+f.t+'</span><span class="cc">'+f.cat+'</span><span class="cw">Watch film ↗</span></div>'+
  '<div class="cframe"><img loading="lazy" src="https://i.ytimg.com/vi/'+f.yt+'/hq2.jpg" onerror="this.onerror=null;this.src=\'https://i.ytimg.com/vi/'+f.yt+'/hqdefault.jpg\'" alt="'+f.t+'"><span class="cplay"></span></div>'+
 '</article>';
}).join('');

var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('seen');io.unobserve(e.target);}});},{threshold:.16});
document.querySelectorAll('.rev').forEach(function(r){io.observe(r);});

var lb=document.getElementById('lb'),lbf=document.getElementById('lbf');
cases.addEventListener('click',function(e){var it=e.target.closest('.case');if(it){lbf.innerHTML='<iframe src="https://www.youtube.com/embed/'+it.dataset.yt+'?autoplay=1&rel=0" allow="autoplay;fullscreen" allowfullscreen></iframe>';lb.classList.add('on');document.body.style.overflow='hidden';}});
function close(){lb.classList.remove('on');document.body.style.overflow='';setTimeout(function(){lbf.innerHTML='';},500);}
document.getElementById('lbx').addEventListener('click',close);
lb.addEventListener('click',function(e){if(e.target===lb)close();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});

/* brand particle field — a whisper here; the films win */
var DPR=Math.min(window.devicePixelRatio||1,2),reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
var fcv=document.getElementById('flow'),fx=fcv.getContext('2d'),FW,FH,FP=[],t=0;
function fsize(){FW=fcv.width=Math.floor(innerWidth*DPR);FH=fcv.height=Math.floor(innerHeight*DPR);fcv.style.width=innerWidth+'px';fcv.style.height=innerHeight+'px';
  var n=Math.round(Math.min(420,(innerWidth*innerHeight)/3600));if(FP.length>n)FP.length=n;while(FP.length<n)FP.push(fspawn());fx.fillStyle='#f4f1ea';fx.fillRect(0,0,FW,FH);}
function fspawn(){return{x:Math.random()*FW,y:Math.random()*FH*1.25-FH*0.12,s:(0.35+Math.random()*0.7)*DPR,hot:Math.random()<0.3,life:Math.random()*160,max:220+Math.random()*300};}
function fang(x,y){var nx=x/FW,ny=y/FH;return -Math.PI/2+Math.sin(ny*3+t*0.6)*0.5+Math.sin(nx*4-t*0.4)*0.45+Math.cos((nx+ny)*2+t*0.3)*0.3;}
function fframe(){t+=0.005;fx.fillStyle='rgba(244,241,234,0.10)';fx.fillRect(0,0,FW,FH);
  for(var i=0;i<FP.length;i++){var p=FP[i],a=fang(p.x,p.y),vx=Math.cos(a)*1.25*DPR,vy=Math.sin(a)*1.25*DPR;if(p.hot){vx*=1.7;vy*=1.7;}
    var px=p.x,py=p.y;p.x+=vx;p.y+=vy;p.life++;var fade=Math.min(1,p.life/30)*Math.max(0,1-p.life/p.max);
    var c=p.hot?[200,68,46]:[110,106,97];fx.strokeStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+((p.hot?0.24:0.13)*fade)+')';
    fx.lineWidth=p.s;fx.beginPath();fx.moveTo(px,py);fx.lineTo(p.x,p.y);fx.stroke();
    if(p.y<-20||p.life>p.max||p.x<-20||p.x>FW+20)FP[i]=fspawn();}
  requestAnimationFrame(fframe);}
addEventListener('resize',fsize);fsize();if(!reduce)requestAnimationFrame(fframe);
</script>
</body>
</html>
